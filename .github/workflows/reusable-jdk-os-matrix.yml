name: Reusable JDK OS Matrix Logic

on:
  workflow_call:
    inputs:
      jdk_version:
        required: true
        type: string
      os_type:
        required: true
        type: string
      cpu_arch:
        required: true
        type: string
      jdk_distribution:
        required: true
        type: string
      jvm_args:
        required: false
        type: string
        default: ""

env:
  JVM_ARGS: ${{ inputs.jvm_args }}
  MAVEN_OPTS: -Xmx4g -Xms1g
  MAVEN_ARGS: "-B -Dmaven.javadoc.skip=true -Dgpg.skip=true -ntp"
  # -ntp (no-transfer-progress) hides the "Downloaded..." lines

jobs:
  build:
    runs-on: ${{ inputs.os_type }}

    steps:
      # Pull down the compiled workspace binaries from Phase 1
      - name: 1. Download Compiled Workspace Jars
        uses: actions/download-artifact@v8
        with:
          name: compiled-jars

      - name: 2. Print Calling Repo & Branch
        continue-on-error: true
        shell: bash
        run: |
          echo "=== Calling Repo & Branch ==="
          echo "Triggered by Repository: ${{ github.repository }}"
          echo "Triggered by Ref/Branch: ${{ github.ref_name }}"

      # Provision ONLY the specific isolated JDK required for this test run
      - name: 3. Provision Target Isolated Execution JDK
        id: target-jdk
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.jdk_version }}
          distribution: ${{ inputs.jdk_distribution }}
          architecture: ${{ inputs.cpu_arch }}
          check-latest: false

      - name: 4. Verify Environment Context
        shell: bash
        run: |
          echo "--- Target JVM Path Exposes: ---"
          echo "Path: ${{ steps.target-jdk.outputs.path }}"
          echo "--- Native Maven Boot Info: ---"
          mvn -version -B

      - name: 5. Run Package Tests from jars via Target JVM Fork
        shell: bash
        run: |
          # Dynamically detect if the host runner is Windows
          if [[ "${{ inputs.os_type }}" == *"windows"* ]]; then
            JAVA_EXE="$JAVA_HOME/bin/java.exe"
          else
            JAVA_EXE="$JAVA_HOME/bin/java"
          fi
          echo "Testing datasketches-java jars for JDK version ${{ inputs.jdk_version }}..."
          mvn surefire:test -B -pl datasketches-java \
            -Dmaven.test.classpath.useTestJar=true \
            -Djvm="$JAVA_EXE" \
            -DargLine="${{ env.JVM_ARGS }}"


      # Build Markdown Job Summary report table for each iteration
      - name: 6. Print Matrix Coordinate Summary
        if: always() # Ensures it prints even if previous maven tests fail!
        shell: bash
        run: |
          # Define and write the table structure
          HEADER="| JDK | OS | Arch | DIST | Status |"
          SEP="|----|------|-----|--------|-----|"
          echo "$HEADER" >> $GITHUB_STEP_SUMMARY
          echo "$SEP" >> $GITHUB_STEP_SUMMARY

          # Determine the status icon dynamically via Bash
          STATUS_ICON="❌"
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_ICON="✅"
          fi

          # Append the specific job row
          echo "| ${{ inputs.jdk_version }} \
          | ${{ inputs.os_type }} \
          | ${{ inputs.cpu_arch }} \
          | ${{ inputs.jdk_distribution }} \
          | $STATUS_ICON |" >> $GITHUB_STEP_SUMMARY
